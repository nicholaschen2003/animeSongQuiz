<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Results</title>
</head>
<body>

  {% for player in playerList %}
  <p>{{ forloop.counter }}. {{ player.name }}: {{ player.points }}</p>
  {% endfor %}
  <form action="{% url 'songQuiz:clearPoints' %}" method="post">
    {% csrf_token %}
    <input type="submit" value="Continue"></input>
  </form>

</body>
</html>
